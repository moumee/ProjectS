name: Mirror Azure DevOps to GitHub

on:
  workflow_dispatch:
    # Only manual triggering

jobs:
  mirror:
    runs-on: ubuntu-latest
    
    steps:

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
      
      - name: Clone Azure DevOps Repository
        run: |
          # Azure DevOps repository details
          AZURE_REPO_URL="https://dev.azure.com/hayoon603/SuraS/_git/SuraS"
          AZURE_PAT="${{ secrets.AZURE_PAT }}"
          
          # Clone the repository with all history
          git clone --mirror "https://$AZURE_PAT@dev.azure.com/hayoon603/SuraS/_git/SuraS" azure_repo
          cd azure_repo
      
      - name: Filter Source Code Files
        run: |
          cd azure_repo
          
          # Create a new temporary branch
          git checkout -b temp_filtered_branch
          
          # Create a .gitattributes file to handle line endings consistently
          echo "* text=auto" > .gitattributes
          
          # Create/update .gitignore to exclude non-source files
          cat > .gitignore << EOL
          # Unreal Engine generated files
          Binaries/
          Build/
          DerivedDataCache/
          Intermediate/
          Saved/
          
          # Large assets
          Content/Movies/
          Content/StarterContent/
          
          # Exclude large binary files
          *.uasset
          *.umap
          *.upk
          *.pak
          *.dll
          *.exe
          *.pdb
          *.lib
          
          # Logs
          *.log
          
          # OS generated files
          .DS_Store
          Thumbs.db
          EOL
          
          # Add .gitattributes and .gitignore
          git add .gitattributes .gitignore
          git commit -m "Add .gitattributes and .gitignore for filtering"
          
          # Use git-filter-repo to keep only source code files
          # First install git-filter-repo
          pip install git-filter-repo
          
          # Then filter the repository to keep only source code files
          git-filter-repo --path "*.cpp" --path "*.h" --path "*.hpp" --path "*.c" --path-glob "*.cs" --path "*.uproject" --path "*.uplugin" --path "Source/" --path "Plugins/" --path "Config/" --path "*.ini" --path "*.build.cs" --path "*.target.cs" --path "*.module.cs" --path "*.version" --path "*.xml" --path "*.json" --force
      
      - name: Push to GitHub
        run: |
          cd azure_repo
          
          # Update remote to point to GitHub repository
          git remote set-url origin "https://${{ secrets.GITHUB_TOKEN }}@github.com/moumee/ProjectS.git"
          
          # Push all branches and tags to GitHub
          git push origin --all -f
          git push origin --tags -f
